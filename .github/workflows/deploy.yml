name: Deploy Frontend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          NUXT_PUBLIC_API_URL: https://backend.taita.blog
          NUXT_PUBLIC_API_BASE: https://backend.taita.blog
          NUXT_PUBLIC_IMAGE_URL: https://backend.taita.blog
          NUXT_PUBLIC_SITE_NAME: Taita Blog
          NUXT_PUBLIC_SITE_URL: https://taita.blog
          NUXT_PUBLIC_MAIN_DOMAIN: taita.blog
          NUXT_PUBLIC_TENANT_DOMAIN: taita.blog
          NODE_ENV: production

      - name: Deploy to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -rlgoDzvc --delete
          path: .output/
          remote_path: /var/www/taita-frontend/.output/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Restart PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: pm2 restart taita-frontend || pm2 start /var/www/taita-frontend/.output/server/index.mjs --name taita-frontend -- --port 3000
